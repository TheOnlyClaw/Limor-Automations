services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    working_dir: /app/apps/api
    command: ["node", "dist/db/cli.js"]
    environment:
      NODE_ENV: production
      DB_PATH: /data/app.sqlite
    volumes:
      - db-data:/data
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DB_PATH: /data/app.sqlite
      DB_MIGRATE_ON_BOOT: 0
    volumes:
      - db-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "3000:3000"

  webhooks:
    build:
      context: .
      dockerfile: Dockerfile
      target: webhooks
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      WEBHOOKS_PORT: 3001
      DB_PATH: /data/app.sqlite
      DB_MIGRATE_ON_BOOT: 0
      IG_WEBHOOK_VERIFY_TOKEN: ${IG_WEBHOOK_VERIFY_TOKEN}
      META_APP_SECRET: ${META_APP_SECRET}
      WEBHOOK_DEBUG_SIGNATURE: ${WEBHOOK_DEBUG_SIGNATURE:-0}
    volumes:
      - db-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "3001:3001"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DB_PATH: /data/app.sqlite
      WEBHOOK_POLL_MS: ${WEBHOOK_POLL_MS:-1000}
      WEBHOOK_BATCH_SIZE: ${WEBHOOK_BATCH_SIZE:-20}
      WEBHOOK_LOCK_TTL_MS: ${WEBHOOK_LOCK_TTL_MS:-300000}
    volumes:
      - db-data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    depends_on:
      api:
        condition: service_healthy
      webhooks:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  db-data:
